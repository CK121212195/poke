        // ポケモン本物の鳴き声（PokeAPI）を再生し、終了後に戦闘曲を流す
        function playPokemonCry(id) {
            if (!soundEnabled) return;
            const cryAudio = new Audio(`https://raw.githubusercontent.com/PokeAPI/cries/main/cries/pokemon/latest/${id}.ogg`);
            cryAudio.volume = 0.5;
            
            cryAudio.onended = () => {
                if (currentState === STATE.REVEALED && soundEnabled) {
                    bgmBattle.volume = 0.2;
                    bgmBattle.currentTime = 0;
                    bgmBattle.play().catch(e => console.warn("戦闘BGM再生エラー", e));
                }
            };

            cryAudio.play().catch(e => {
                console.warn("鳴き声データの再生に失敗しました", e);
                setTimeout(() => {
                    if (currentState === STATE.REVEALED && soundEnabled) {
                        bgmBattle.volume = 0.2;
                        bgmBattle.currentTime = 0;
                        bgmBattle.play().catch(err => console.warn(err));
                    }
                }, 1000);
            });
        }

        function playAudio(type) {
            if (!soundEnabled) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'click') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(800, now);
                    gain.gain.setValueAtTime(0.08, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                } else if (type === 'motor') {
                    osc.type = 'square';
                    for(let i=0; i<10; i++) {
                        osc.frequency.setValueAtTime(400, now + i*0.1);
                        gain.gain.setValueAtTime(0.05, now + i*0.1);
                        gain.gain.setValueAtTime(0, now + i*0.1 + 0.05);
                    }
                    osc.start(now); osc.stop(now + 1.0);
                } else if (type === 'pop') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(1200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                } else if (type === 'success') {
                    osc.type = 'square';
                    const notes = [523.25, 659.25, 783.99, 1046.50];
                    let time = now;
                    notes.forEach((freq, i) => {
                        osc.frequency.setValueAtTime(freq, time);
                        time += (i === notes.length - 1) ? 0.4 : 0.1;
                    });
                    gain.gain.setValueAtTime(0.08, now); gain.gain.linearRampToValueAtTime(0, time);
                    osc.start(now); osc.stop(time);
                }
            } catch (e) { console.warn("Audio error: ", e); }
        }

        async function copyImageToClipboard(imgUrl) {
            try {
                const response = await fetch(imgUrl, { mode: 'cors' });
                const blob = await response.blob();
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                return true;
            } catch (err) {
                try {
                    const img = new Image(); img.crossOrigin = "anonymous";
                    await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = imgUrl; });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
                    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                    return true;
                } catch (e) { return false; }
            }
        }

        async function triggerReveal() {

            document.getElementById('prize-flavor-text').textContent = "...";

            loader.classList.remove('hidden', 'opacity-0');

            toggleModal(document.getElementById('prize-modal'), true);
            currentState = STATE.REVEALED;

            cap.classList.add('hidden'); cap.classList.remove('animate-drop', 'ball-glow');
            document.getElementById('crank-handle').style.transform = "rotate(0deg)";
            document.getElementById('crank-handle').style.transition = "none";

            try {
                // TCG APIは遅いことが多いので、通信量削減(select)と2秒のタイムアウトを設ける
                const fetchTcgApi = async () => {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 3000);
                    try {
                        const res = await fetch(`https://api.pokemontcg.io/v2/cards?q=nationalPokedexNumbers:${targetId}&select=id,images`, { signal: controller.signal });
                        clearTimeout(timeoutId);
                        return res;
                    } catch (e) {
                        return null; // タイムアウト時はnullを返して即座に公式アートワークにフォールバック
                    }
                };

                // APIからデータ並行取得 (PokeAPI + Pokemon TCG API)
                const [pokeRes, speciesRes, tcgRes] = await Promise.all([
                    fetch(`https://pokeapi.co/api/v2/pokemon/${targetId}`),
                    fetch(`https://pokeapi.co/api/v2/pokemon-species/${targetId}`),
                    fetchTcgApi()
                ]);

                const pokeData = await pokeRes.json();
                const speciesData = await speciesRes.json();
                
                // カード画像URLの取得
                let imgUrl = "";
                if (tcgRes && tcgRes.ok) {
                    try {
                        const tcgData = await tcgRes.json();
                        if (tcgData && tcgData.data && tcgData.data.length > 0) {
                            const randomCard = tcgData.data[Math.floor(Math.random() * tcgData.data.length)];
                            imgUrl = randomCard.images.large || randomCard.images.small;
                        }
                    } catch(e) { console.warn("TCG API parse error", e); }
                }

                if (!imgUrl) {
                    imgUrl = (pokeData.sprites.other && pokeData.sprites.other["official-artwork"].front_default) 
                             ? pokeData.sprites.other["official-artwork"].front_default 
                             : pokeData.sprites.front_default;
                }

                // 名前
                let jpNameObj = speciesData.names.find(n => n.language.name === "ja-Hrkt") || speciesData.names.find(n => n.language.name === "ja");
                let enNameObj = speciesData.names.find(n => n.language.name === "en");
                let jpName = jpNameObj ? jpNameObj.name : pokeData.name;
                let enName = enNameObj ? enNameObj.name : pokeData.name;
                let finalName = currentLang === 'en' ? (enName.charAt(0).toUpperCase() + enName.slice(1)) : jpName;
                
                // 分類（Genus）
                let jpGenusObj = speciesData.genera.find(g => g.language.name === "ja-Hrkt") || speciesData.genera.find(g => g.language.name === "ja");
                let enGenusObj = speciesData.genera.find(g => g.language.name === "en");
                let jpGenus = jpGenusObj ? jpGenusObj.genus : "";
                let enGenus = enGenusObj ? enGenusObj.genus : "";
                let finalGenus = currentLang === 'en' ? enGenus : jpGenus;

                // 図鑑説明文
                let flavorText = "";
                const entries = speciesData.flavor_text_entries;
                for (let i = entries.length - 1; i >= 0; i--) {
                    if (currentLang === 'en' && entries[i].language.name === 'en') {
                        flavorText = entries[i].flavor_text;
                        break;
                    } else if (currentLang === 'jp' && (entries[i].language.name === 'ja-Hrkt' || entries[i].language.name === 'ja')) {
                        flavorText = entries[i].flavor_text;
                        break;
                    }
                }
                if (!flavorText) flavorText = currentLang === 'en' ? "No data available." : "データがありません。";
                flavorText = flavorText.replace(/[\n\f\r]/g, ' ');

                // タイプ
                const typesHtml = pokeData.types.map(t => {

                            const jpObj = abData.names.find(n => n.language.name === 'ja-Hrkt') || abData.names.find(n => n.language.name === 'ja');

                const abilitiesHtmlArr = await Promise.all(abilitiesHtmlPromises);

                // 種族値

                const statsHtml = pokeData.stats.map(s => {
                    const statKey = s.stat.name;

                ? `I caught "${lastWonItemName}" with the Pokémon Gacha! 🔴⚪️\n\nPlay for free:`
                : `ポケモン ガシャポンで「${lastWonItemName}」をゲットしました！🔴⚪️\n\n無料で遊ぶ：`;
                
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(tweetText)}&url=${encodeURIComponent(siteUrl)}`, '_blank');
        });

        function handleStartGacha() {
            if (currentState === STATE.ROLLING || currentState === STATE.HAS_CAPSULE) return;
            playAudio('click'); playGashaponRotation();
        }

        document.getElementById('btn-play').addEventListener('click', handleStartGacha);
        document.getElementById('crank-handle').addEventListener('click', () => { if (currentState === STATE.IDLE) handleStartGacha(); });
        
        // 閉じるボタンを押したときの処理
        document.getElementById('btn-close-prize').addEventListener('click', () => {
            playAudio('click');
            toggleModal(document.getElementById('prize-modal'), false);
            const cap = document.getElementById('dispensed-capsule');
            cap.classList.add('hidden'); cap.classList.remove('animate-drop', 'ball-glow');
            lastWonItemImageUrl = ""; lastWonItemName = "";
            currentState = STATE.IDLE;

            // 戦闘BGMを停止し、オープニングBGMを最初から再開する
            bgmBattle.pause();
            bgmBattle.currentTime = 0;
            if (soundEnabled && isOpStarted) {
                bgmOp.currentTime = 0; // 曲を最初から流す
                bgmOp.play().catch(e=>{});
            }
        });

        // 起動時の言語を英語に
        updateLanguage('en');
    </script>
</body>
</html>
